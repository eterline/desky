<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desky - Panel</title>
    <link rel="stylesheet" href="/static/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        body {background-image: url("/static/images/{{.Background}}");}
    </style>
</head>
<body>
    <header>
        <div class="header">
            <H1>
                <i class="fa fa-server" aria-hidden="true"></i>
                {{.Host}}
            </H1>
            <ul>
                <li><a href="/dashboard/panel">Home</a></li>
                <li><a href="/dashboard/docker">Docker</a></li>
                <li><a href="/dashboard/vm">Proxmox</a></li>
                <li id="logout"><a href="/logout">Log Out</a></li>
            </ul> 
        </div>
    </header>
    <main>
        <div class="padding">
            <div class="sys-info">
                <div class="device">
                    <div class="load-data" id="cpu-usage">0%</div>
                    <div class="metric-type">
                        <i class="fa fa-microchip" aria-hidden="true"></i>
                        Cpu Load
                    </div>
                </div>
                <div class="device">
                    <div class="load-data" id="mem-usage">0%</div>
                    <div class="metric-type">
                        <i class="fa fa-bars" aria-hidden="true"></i>
                        Mem Load
                    </div>
                </div>
                <div class="paltform">
                    Board:{{.Board}}
                    <br>
                    CPU:{{.Cpu}}
                </div>
            </div>
            <div class="main">
                {{ range .Apps }}
                <a href="{{ .Url }}">
                    <div class="app">
                        <img style="width: 90px; height: 90px;" src="/static/images/web-icons/{{ .Icon }}.svg" alt="">
                        <div class="app-name">
                            {{ .Name }}
                        </div>
                    </div>
                </a>
                {{ end }}
            </div>
        </div>
    </main>
    <footer>
        <div class="footer">
            Desky
        </div>
        <script src="/static/scripts/dashboard.js"></script> 
    </footer>
</body>
</html>
