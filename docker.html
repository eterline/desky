<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desky - Panel</title>
    <link rel="stylesheet" href="/static/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/docker.css">
</head>
<body>
    <header>
        <div class="header">
            <H1>
                <i class="fa fa-server" aria-hidden="true"></i>
                {{.Host}}
            </H1>
            <ul>
                <li><a href="/dashboard/panel">Home</a></li>
                <li><a href="/dashboard/docker">Docker</a></li>
                <li><a href="/dashboard/vm">Proxmox</a></li>
                <li id="logout"><a href="/logout">Log Out</a></li>
            </ul> 
        </div>
    </header>
    <main>
        <div class="padding">
            {{ range .Containers }}
                <div class="container">
                    <img style="height: 100px;" src="/static/images/web-icons/docker.svg" alt="">
                    <div class="ct-data">
                        <table>
                            <div style="font-size: 0.8em;">
                                id: {{ .ID }}
                            </div>
                            <tr>
                                <th>Name</th>
                                <td> {{ .Names }}</td>
                            </tr>
                            <tr>
                                <th>Image</th>
                                <td> {{ .Image }}</td>
                            </tr>
                            <tr>
                                <th>Uptime</th>
                                <td> {{ .Status }}</td>
                            </tr>
                            <tr>
                                <th>Live</th>
                                <td> {{ .RunningFor }}</td>
                            </tr>
                            <tr>
                                <th>Size</th>
                                <td> {{ .Size }}</td>
                            </tr>
                            <tr>
                                <th>Networks</th>
                                <td> {{ .Networks }}</td>
                            </tr>
                            <tr>
                                <th>Created</th>
                                <td> {{ .CreatedAt }}</td>
                            </tr>
                          </table> 
                    </div>
                </div>
            {{ end }}
        </div>
    </main>
    <footer>
        <div class="footer">
            Desky
        </div>
    </footer>
</body>
</html>
